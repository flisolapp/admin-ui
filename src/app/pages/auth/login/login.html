<app-page-auth>
  <h1 class="inline-flex items-center text-default text-4xl font-black mb-4 text-foreground">
    <!--
    <button matIconButton (click)="onBack()" class="mr-2">
      <mat-icon>arrow_back</mat-icon>
    </button>
    -->
    Log in
  </h1>
  <p class="text-default text-muted-foreground mb-10 text-justify">
    Fill the form with yours credentials.
  </p>

  <form class="w-full" [formGroup]="form" (ngSubmit)="onSubmit($event)" novalidate>

    <!-- E-mail -->
    <mat-form-field class="w-full mb-4">
      <mat-label>E-mail</mat-label>
      <input matInput type="email" formControlName="email" autocomplete="email" />
      @if (hasError('email')) {
        <mat-error>{{ getError('email') }}</mat-error>
      }
    </mat-form-field>

    <!-- Password -->
    <mat-form-field class="w-full mb-4">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="none" />
      @if (hasError('password')) {
        <mat-error>{{ getError('password') }}</mat-error>
      }
    </mat-form-field>

    <!-- Actions -->
    <div class="form-actions">
      <!--
      <button mat-button type="button" (click)="onBack()">
        <mat-icon>arrow_back</mat-icon>
        {{ 'common.back' | translate }}
      </button>
      -->
      <button mat-flat-button color="primary" type="submit" class="w-full">
        Log in
      </button>
    </div>
  </form>
</app-page-auth>
