<h1 mat-dialog-title>Pré-visualização</h1>

<div mat-dialog-content class="flex justify-center">
  <img [src]="data.imageUrl" alt="Preview" class="preview" />
</div>

<div mat-dialog-actions class="actions">
  <form
    [formGroup]="form"
    class="action-form"
  >
    <div class="action-primary-row">
      <button
        mat-flat-button
        color="primary"
        type="button"
        class="print-button"
        (click)="print()"
        [disabled]="printing()"
      >
        @if (printing()) {
          <mat-spinner diameter="20" mode="indeterminate"></mat-spinner>
        } @else {
          <span class="inline-flex items-center gap-2">
            <mat-icon>print</mat-icon>
            <span>Imprimir</span>
          </span>
        }
      </button>

      <mat-form-field appearance="outline" class="connection-field">
        <mat-label>Conexão</mat-label>

        <mat-select formControlName="connectionType" [disabled]="printing()">
          <mat-select-trigger>
            <span class="select-trigger-content">
              <mat-icon>
                {{ form.controls.connectionType.value === 'serial' ? 'usb' : 'bluetooth' }}
              </mat-icon>
              <span>
                {{ form.controls.connectionType.value === 'serial' ? 'USB' : 'Bluetooth' }}
              </span>
            </span>
          </mat-select-trigger>

          <mat-option value="serial">
            <span class="option-content">
              <mat-icon>usb</mat-icon>
              <span>USB</span>
            </span>
          </mat-option>

          <mat-option value="bluetooth">
            <span class="option-content">
              <mat-icon>bluetooth</mat-icon>
              <span>Bluetooth</span>
            </span>
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <button
      mat-button
      type="button"
      mat-dialog-close
      class="close-button"
      cdkFocusInitial
      (click)="close()"
      [disabled]="printing()"
    >
      Fechar
    </button>
  </form>
</div>
