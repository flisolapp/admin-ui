<h2 mat-dialog-title class="m-0 px-6 pt-6 text-xl font-semibold text-slate-900">
  Gerar etiqueta
</h2>

<form [formGroup]="form" class="block">
  <div
    mat-dialog-content
    class="flex flex-col gap-4 px-6 pt-2 pb-0"
  >
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="firstName" maxlength="10" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Sobrenome</mat-label>
      <input matInput formControlName="lastName" maxlength="14" />
    </mat-form-field>
  </div>

  <div
    mat-dialog-actions
    class="flex w-full flex-col items-stretch gap-4 px-6 py-5 sm:flex-row sm:items-center sm:justify-between"
  >
    <div class="flex min-h-9 items-center">
      <!--
      @if (isEditMode) {
        <mat-slide-toggle formControlName="is_active" class="m-0">
          {{ form.get('is_active')?.value ? 'Ativo' : 'Inativo' }}
        </mat-slide-toggle>
      }
      -->
    </div>

    <div class="flex w-full justify-end gap-3 sm:w-auto">
      <button mat-button type="button" (click)="close()">Cancelar</button>
      <button
        mat-flat-button
        color="primary"
        type="button"
        (click)="submit()"
        [disabled]="form.invalid"
      >
        Gerar
      </button>
    </div>
  </div>
</form>
