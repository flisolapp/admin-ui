<h2 mat-dialog-title>Remover local</h2>

<div mat-dialog-content class="pt-2">
  <p>
    Deseja remover o local <strong>{{ data.name }}</strong>?
  </p>
</div>

<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close(false)">Cancelar</button>
  <button mat-flat-button color="warn" type="button" (click)="close(true)">Remover</button>
</div>
