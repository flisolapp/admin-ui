<h2 mat-dialog-title>
  {{ data.mode === 'create' ? 'Adicionar local' : 'Editar local' }}
</h2>

<div mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 pt-2">
    <mat-form-field appearance="outline">
      <mat-label>Tipo</mat-label>
      <mat-select formControlName="kind">
        @for (option of kindOptions; track option.value) {
          <mat-option [value]="option.value">{{ option.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="name" placeholder="Sala 1.1, Lab 2.8..." />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="description" placeholder="Palestras, Installfest, apoio..." />
    </mat-form-field>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <mat-form-field appearance="outline">
        <mat-label>Andar</mat-label>
        <input matInput formControlName="floor" placeholder="1, 2..." />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Capacidade</mat-label>
        <input matInput type="number" min="0" formControlName="capacity" />
      </mat-form-field>
    </div>

    <mat-slide-toggle formControlName="active">Ativo</mat-slide-toggle>
  </form>
</div>

<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="submit()" [disabled]="form.invalid">
    {{ data.mode === 'create' ? 'Criar' : 'Salvar' }}
  </button>
</div>
