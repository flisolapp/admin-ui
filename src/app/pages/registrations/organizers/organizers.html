<app-page-structure>
  <div class="min-h-screen px-4 py-12">
    <div class="mx-auto flex w-full max-w-[960px] flex-col gap-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h1 class="text-default mb-2 inline-flex items-center text-4xl font-black">
            Organizadores
          </h1>
        </div>

        <div class="flex items-center gap-2">
          <button
            mat-icon-button
            matTooltip="Exportar CSV"
            type="button"
            (click)="exportOrganizers()"
            [disabled]="exporting() || loading()">
            <mat-icon>download</mat-icon>
          </button>

          <button
            mat-icon-button
            matTooltip="Atualizar"
            type="button"
            (click)="loadOrganizers()">
            <mat-icon>refresh</mat-icon>
          </button>

          <button
            mat-icon-button
            matTooltip="Adicionar"
            type="button"
            (click)="openCreateDialog()"
          >
            <mat-icon>add</mat-icon>
          </button>
        </div>
      </div>

      <div
        class=""
        [class.bg-neutral-900]="themeService.darkMode()"
        [class.bg-white]="!themeService.darkMode()"
      >
        <div class="p-4">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Buscar organizador</mat-label>

            <input
              matInput
              [value]="search()"
              (input)="applyFilter($event)"
              placeholder="Nome, e-mail, telefone, CPF..."
            />

            @if (search()) {
              <button
                mat-icon-button
                matSuffix
                type="button"
                aria-label="Limpar busca"
                (click)="clearFilter()"
                class="mr-2"
              >
                <mat-icon>close</mat-icon>
              </button>
            } @else {
              <mat-icon matSuffix class="mr-1">search</mat-icon>
            }
          </mat-form-field>
        </div>

        @if (exporting() || loading()) {
          <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        }

        <div class="overflow-x-auto">
          <table
            mat-table
            [dataSource]="dataSource"
            matSort
            matSortDisableClear
            [matSortActive]="sortBy() ?? 'id'"
            [matSortDirection]="sortDirection() || 'desc'"
            class="striped-table w-full"
          >
            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-default">
                ID
              </th>
              <td mat-cell *matCellDef="let row" class="text-default">{{ row.id }}</td>
            </ng-container>

            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-default">
                Nome
              </th>
              <td mat-cell *matCellDef="let row" class="text-default">{{ row.name }}</td>
            </ng-container>

            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-default">
                E-mail
              </th>
              <td mat-cell *matCellDef="let row" class="text-default">{{ row.email }}</td>
            </ng-container>

            <ng-container matColumnDef="phone">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-default">
                Telefone
              </th>
              <td mat-cell *matCellDef="let row" class="text-default">{{ row.phone }}</td>
            </ng-container>

            <ng-container matColumnDef="federalCode">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-default">
                CPF
              </th>
              <td mat-cell *matCellDef="let row" class="text-default">
                {{ row.federalCode || '—' }}
              </td>
            </ng-container>

            <!--
            <ng-container matColumnDef="confirmed">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-default">
                Confirmado
              </th>
              <td mat-cell *matCellDef="let row">
                <mat-slide-toggle
                  [checked]="row.confirmed"
                  (change)="toggleConfirmation(row)">
                </mat-slide-toggle>
              </td>
            </ng-container>
            -->

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-right">Ações</th>
              <td mat-cell *matCellDef="let row" class="text-right">

                <button mat-icon-button [matMenuTriggerFor]="menu">
                  <mat-icon>more_vert</mat-icon>
                </button>

                <mat-menu #menu="matMenu">
                  <button mat-menu-item (click)="openEditDialog(row)">
                    <mat-icon>edit</mat-icon>
                    Editar
                  </button>

                  <button mat-menu-item (click)="openDeleteDialog(row)">
                    <mat-icon>delete</mat-icon>
                    Remover
                  </button>
                </mat-menu>

              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

            <tr class="mat-mdc-row" *matNoDataRow>
              <td
                class="mat-mdc-cell text-default p-4 text-center"
                [attr.colspan]="displayedColumns.length"
              >
                Nenhum organizador encontrado.
              </td>
            </tr>
          </table>
        </div>

        <mat-paginator
          [length]="total()"
          [pageIndex]="page() - 1"
          [pageSize]="perPage()"
          [pageSizeOptions]="[10, 25, 50, 100]"
          (page)="onPageChange($event)"
          showFirstLastButtons>
        </mat-paginator>
      </div>
    </div>
  </div>
</app-page-structure>
