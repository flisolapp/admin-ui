<h2 mat-dialog-title>Remover organizador</h2>

<div mat-dialog-content class="pt-2">
  <p>
    Deseja remover o organizador <strong>{{ data.name }}</strong>?
  </p>
  <!--
  <p class="text-sm opacity-80">Esta ação ocultará o organizador da listagem.</p>
  -->
</div>

<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close(false)">Cancelar</button>
  <button mat-flat-button color="warn" type="button" (click)="close(true)">Remover</button>
</div>
