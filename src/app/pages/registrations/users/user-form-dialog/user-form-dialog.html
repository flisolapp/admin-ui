<h2 mat-dialog-title>
  {{ data.mode === 'create' ? 'Adicionar usuário' : 'Editar usuário' }}
</h2>

<form [formGroup]="form" class="user-form-dialog">
  <div mat-dialog-content class="user-form-dialog__content">
    <mat-form-field appearance="outline" class="user-form-dialog__field">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="user-form-dialog__field">
      <mat-label>E-mail</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="user-form-dialog__field">
      <mat-label>Perfil</mat-label>
      <mat-select formControlName="role">
        <!-- <mat-option value="super_admin">Super Administrador</mat-option> -->
        <mat-option value="admin">Administrador</mat-option>
        <mat-option value="organizer">Organizador</mat-option>
        <mat-option value="credential">Credenciamento</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div mat-dialog-actions class="user-form-dialog__actions">
    <div class="user-form-dialog__actions-left">
      @if (isEditMode) {
        <mat-slide-toggle formControlName="is_active">
          {{ form.get('is_active')?.value ? 'Ativo' : 'Inativo' }}
        </mat-slide-toggle>
      }
    </div>

    <div class="user-form-dialog__actions-right">
      <button mat-button type="button" (click)="close()">Cancelar</button>
      <button
        mat-flat-button
        color="primary"
        type="button"
        (click)="submit()"
        [disabled]="form.invalid"
      >
        {{ data.mode === 'create' ? 'Criar' : 'Salvar' }}
      </button>
    </div>
  </div>
</form>
