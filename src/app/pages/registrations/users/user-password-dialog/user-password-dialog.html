<h2 mat-dialog-title>Senha gerada</h2>

<div mat-dialog-content class="flex flex-col gap-3 pt-2">
  <p><strong>Usuário:</strong> {{ data.user.name }}</p>
  <p><strong>E-mail:</strong> {{ data.user.email }}</p>

  <div class="rounded-lg border p-3 font-mono text-sm break-all">
    {{ data.generated_password }}
  </div>

  <p class="text-sm opacity-80">
    Copie esta senha agora e compartilhe com o usuário final.
  </p>
</div>

<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="copyPassword()">
    <mat-icon>content_copy</mat-icon>
    Copiar senha
  </button>

  <button mat-flat-button color="primary" type="button" (click)="close()">
    Fechar
  </button>
</div>
